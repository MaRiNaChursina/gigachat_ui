name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Base path for Vite
        id: base
        run: |
          BP='${{ vars.VITE_BASE_PATH }}'
          if [ -z "$BP" ]; then BP="/${{ github.event.repository.name }}/"; fi
          echo "VITE_BASE_PATH=$BP" >> "$GITHUB_ENV"
          echo "Using VITE_BASE_PATH=$BP"

      - name: Build
        env:
          VITE_GIGACHAT_AUTHORIZATION_KEY: ${{ secrets.VITE_GIGACHAT_AUTHORIZATION_KEY }}
          VITE_GIGACHAT_SCOPE: ${{ secrets.VITE_GIGACHAT_SCOPE }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
